version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: routepilot-ai-app
    restart: always
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - PORT=8000
      - LOG_LEVEL=INFO
      - SECRET_KEY=DELL_FUTUREMINDS_CHALLENGE_SECRET_2026
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/monitoring/health-status"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: routepilot-ai-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - app
